<!doctype html>
<html lang="fr">
  <head>
    <!--
    Auteur      : Néo Darbellay, David Sottas et Aaron Vichery
    Date        : 23.01.2026
    Description : Page de test pour la carte interactive
    -->

    <meta charset="UTF-8" />

    <meta
      name="author"
      content="Néo Darbellay, David Sottas et Aaron Vichery"
    />
    <meta name="description" content="Page de test pour la carte interactive" />
    <meta name="keywords" xml:lang="fr" lang="fr" content="test, carte" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carte - Sites de l'UNESCO</title>

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- Les clusteurs (groupes de pins quand il y en a trop) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />

    <!-- Rercherche de pins -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.pinsearch/src/Leaflet.PinSearch.css"
      crossorigin=""
    />
    <link rel="stylesheet" href="./ressources/css/style.css" crossorigin="" />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script
      src="https://unpkg.com/leaflet.pinsearch/src/Leaflet.PinSearch.js"
      crossorigin=""
    ></script>
  </head>

  <body style="margin: 0">
    <div style="display: flex">
      <div id="map" style="width: 70vw; height: 100vh"></div>

      <div
        id="info-panel"
        style="
          width: 30vw;
          padding: 16px;
          border-left: 1px solid #ddd;
          overflow-y: auto;
          font-family: sans-serif;
        "
      >
        <h3>Veuillez sélectionner un site</h3>
        <p>Cliquez sure un site pour voir sa description</p>
      </div>
    </div>

    <script src="/src/js/map.js"></script>
  </body>
</html>
