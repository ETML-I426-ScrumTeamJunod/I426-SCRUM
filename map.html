<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sites de l'UNESCO</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.pinsearch/src/Leaflet.PinSearch.css"
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet.pinsearch/src/Leaflet.PinSearch.js"
      crossorigin=""
    ></script>
  </head>

  <body>
    <body style="margin: 0">
    <div style="display: flex">
      <div id="map" style="width: 70vw; height: 100vh"></div>

      <div
        id="info-panel"
        style="
          width: 30vw;
          padding: 16px;
          border-left: 1px solid #ddd;
          overflow-y: auto;
          font-family: sans-serif;
        "
      >
        <h3>Veuillez sélecter un site</h3>
        <p>Cliquez sure un site pour voir sa description</p>
      </div>
    </div>
    <script>
      const bounds = L.latLngBounds(L.latLng(-85, -180), L.latLng(85, 180));

      const map = L.map("map", {
        center: [20, 0],
        zoom: 2,
        minZoom: 2,
        maxBounds: bounds,
        maxBoundsViscosity: 1.0,
      });

      L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        {
          attribution:
            "Tiles © Esri — Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye",
        },
      ).addTo(map);

      // Icons
      const defaultIcon = L.icon({
        iconUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png",
        shadowUrl:
          "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
        iconSize: [25, 41],
        iconAnchor: [12, 41],
      });

      const selectedIcon = L.icon({
        iconUrl:
          "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
        shadowUrl:
          "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
        iconSize: [30, 50],
        iconAnchor: [15, 50],
      });

      // Markers
      const markersCluster = L.markerClusterGroup();
      let activeMarker = null;

      fetch("./ressources/data/world-heritage-list.json")
        .then((r) => r.json())
        .then((data) => {
          // Create a cluster
          const markersCluster = L.markerClusterGroup();
          const allMarkers = [];

          data.forEach((site) => {
            const marker = L.marker(
              [site.coordinates.lat, site.coordinates.lon],
              { title: site.site },
              { icon: defaultIcon}
            );
            const panelContent = `
              <h2>${site.site}</h2>
              <small style="color: gray">${site.category}</small>
              <hr>
              <p>${site.short_description}</p>
              <button style="padding: 8px 12px">
                Ajouter en tant que visité
              </button>
            `;
            marker.on("click", () => {
              // Update side panel
              document.getElementById("info-panel").innerHTML = panelContent;
              // Reset previous marker
              if (activeMarker && activeMarker !== marker) {
                activeMarker.setIcon(defaultIcon);
              }

              // Focus map
              markersCluster.zoomToShowLayer(marker, () => {
                map.setView(marker.getLatLng(), Math.max(map.getZoom(), 6), {
                  animate: true,
                });
              });
            });
            allMarkers.push(marker);
            markersCluster.addLayer(marker);
          });
          map.addLayer(markersCluster);
          var searchBar = L.control
            .pinSearch({
              position: "topright",
              placeholder: "Search...",
              buttonText: "Search",
              layerToSearch: markersCluster,
              onSearch: function (query) {
                const marker = allMarkers.find((m) =>
                  m.options.title.toLowerCase().includes(query.toLowerCase()),
                );

                if (!marker) {
                  alert("Aucun résultat");
                  return;
                }

                markersCluster.zoomToShowLayer(marker, function () {
                  marker.openPopup();
                });
              },
              searchBarWidth: "200px",
              searchBarHeight: "30px",
              maxSearchResults: 10,
            })
            .addTo(map);
        })
        // Clear selection on click
      map.on("click", () => {
        if (activeMarker) {
          activeMarker.setIcon(defaultIcon);
          activeMarker = null;
        }

        document.getElementById("info-panel").innerHTML = `
          <h3>Select a site</h3>
          <p>Click a marker to see details here.</p>
        `;
      });
    </script>
  </body>
</html>
