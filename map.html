<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test de la map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  </head>

  <body>
    <div
      id="map"
      style="width: 1024px; height: 1020px; position: relative"
    ></div>
    <script>
      let bounds = L.latLngBounds(L.latLng(-85, -180), L.latLng(85, 180));

      let map = L.map("map", {
        center: [20, 0],
        zoom: 2,
        minZoom: 2,
        maxBounds: bounds,
        maxBoundsViscosity: 1.0,
      });

      var Esri_WorldImagery = L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        {
          attribution:
            "Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community",
        },
      ).addTo(map);

      fetch("./ressources/data/world-heritage-list.json")
        .then((response) => {
          if (!response.ok) {
            throw new Error(`HTTP error! Status: ${response.status}`);
          }
          return response.json();
        })
        .then((data) => {
          // Create a cluster
          const markersCluster = L.markerClusterGroup();

          data.forEach((site) => {
            let marker = L.marker([site.coordinates.lat, site.coordinates.lon]);

            let btnText = "Ajouter en tant que visité";
            let btnClass = "add";
            let statusHtml = '<b style="color:#dc3545"></b>';

            let popupContent = /*HTML*/ `
        <div style="text-align:center; min-width: 150px;">
            <strong>${site.site}</strong><br>
            <small style="color:gray">${site.category}</small>

            <hr style="margin: 5px 0; border: 0; border-top: 1px solid #eee;">

            <p>${site.short_description}</p>

            <hr style="margin: 5px 0; border: 0; border-top: 1px solid #eee;">

            ${statusHtml}<br>
            <button class="action-btn ${btnClass}">
                ${btnText}
            </button>
        </div>
      `;

            marker.bindPopup(popupContent);
            markersCluster.addLayer(marker); // add to cluster
          });

          map.addLayer(markersCluster); // add cluster to map
        })
        .catch((err) => {
          console.error("Error loading JSON:", err);
        });
    </script>
  </body>
</html>
